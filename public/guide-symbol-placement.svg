<svg width="560" height="300" viewBox="0 0 560 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">

  <!-- Background -->
  <rect width="560" height="300" fill="#f8fafc" rx="12"/>

  <!-- ── Palette panel (left) ─────────────────────── -->
  <rect x="20" y="40" width="110" height="222" fill="white" stroke="#e2e8f0" stroke-width="1.5" rx="8"/>
  <text x="75" y="33" text-anchor="middle" font-size="11" fill="#64748b">기호 팔레트</text>

  <!-- Symbol button 1: 겉뜨기 (knit) — vertical bar -->
  <rect x="30" y="50" width="90" height="46" fill="white" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <line x1="75" y1="60" x2="75" y2="86" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <text x="75" y="104" text-anchor="middle" font-size="9" fill="#64748b">겉뜨기</text>

  <!-- Symbol button 2: 안뜨기 (purl) — horizontal bar — SELECTED -->
  <rect x="30" y="108" width="90" height="46" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" rx="4"/>
  <line x1="56" y1="131" x2="94" y2="131" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="75" cy="131" r="3" fill="#1e293b"/>
  <text x="75" y="162" text-anchor="middle" font-size="9" fill="#16a34a" font-weight="600">안뜨기 ✓</text>

  <!-- Symbol button 3: 코늘리기 — V shape -->
  <rect x="30" y="166" width="90" height="46" fill="white" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <path d="M 64 178 L 75 196 L 86 178" fill="none" stroke="#1e293b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="75" y="220" text-anchor="middle" font-size="9" fill="#64748b">코늘리기</text>

  <!-- Symbol button 4: 코줄임 — X (two lines) -->
  <rect x="30" y="224" width="90" height="30" fill="white" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <line x1="61" y1="231" x2="89" y2="247" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <line x1="89" y1="231" x2="61" y2="247" stroke="#1e293b" stroke-width="2" stroke-linecap="round"/>
  <text x="75" y="266" text-anchor="middle" font-size="9" fill="#64748b">코줄임</text>

  <!-- ── Arrow: palette → grid ────────────────────── -->
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
  </defs>
  <line x1="140" y1="150" x2="188" y2="150" stroke="#16a34a" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arw)"/>
  <text x="164" y="142" text-anchor="middle" font-size="9" fill="#16a34a">선택</text>

  <!-- ── Grid: 5 cols × 5 rows, cell=44px, top-left (200, 40) ── -->
  <!-- Grid size: 220 × 220 px -->
  <rect x="200" y="40" width="220" height="220" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>

  <!-- Vertical lines -->
  <line x1="244" y1="40" x2="244" y2="260" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="288" y1="40" x2="288" y2="260" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="332" y1="40" x2="332" y2="260" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="376" y1="40" x2="376" y2="260" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Horizontal lines -->
  <line x1="200" y1="84"  x2="420" y2="84"  stroke="#e2e8f0" stroke-width="1"/>
  <line x1="200" y1="128" x2="420" y2="128" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="200" y1="172" x2="420" y2="172" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="200" y1="216" x2="420" y2="216" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Filled cells: 안뜨기 symbol (horizontal bar + dot) -->
  <!-- Row1 Col2 -->
  <line x1="258" y1="62" x2="274" y2="62" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="266" cy="62" r="3" fill="#1e293b"/>
  <!-- Row1 Col3 -->
  <line x1="302" y1="62" x2="318" y2="62" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="310" cy="62" r="3" fill="#1e293b"/>
  <!-- Row2 Col1 -->
  <line x1="214" y1="106" x2="230" y2="106" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="222" cy="106" r="3" fill="#1e293b"/>
  <!-- Row2 Col2 -->
  <line x1="258" y1="106" x2="274" y2="106" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="266" cy="106" r="3" fill="#1e293b"/>
  <!-- Row2 Col4 -->
  <line x1="346" y1="106" x2="362" y2="106" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="354" cy="106" r="3" fill="#1e293b"/>
  <!-- Row3 Col3 -->
  <line x1="302" y1="150" x2="318" y2="150" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="310" cy="150" r="3" fill="#1e293b"/>
  <!-- Row3 Col5 -->
  <line x1="390" y1="150" x2="406" y2="150" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="398" cy="150" r="3" fill="#1e293b"/>
  <!-- Row4 Col2 -->
  <line x1="258" y1="194" x2="274" y2="194" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="266" cy="194" r="3" fill="#1e293b"/>
  <!-- Row4 Col4 -->
  <line x1="346" y1="194" x2="362" y2="194" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="354" cy="194" r="3" fill="#1e293b"/>

  <!-- Active cell (row3 col1) with cursor ring -->
  <rect x="200" y="128" width="44" height="44" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <!-- cursor dot -->
  <circle cx="222" cy="150" r="5" fill="none" stroke="#16a34a" stroke-width="2"/>
  <circle cx="222" cy="150" r="2" fill="#16a34a"/>

  <!-- Grid label -->
  <text x="310" y="280" text-anchor="middle" font-size="11" fill="#64748b">셀 클릭 또는 드래그로 기호 배치</text>

  <!-- Right label box -->
  <rect x="440" y="100" width="105" height="50" fill="white" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="492" y="119" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">기호 배치</text>
  <text x="492" y="135" text-anchor="middle" font-size="9" fill="#64748b">클릭·드래그로</text>
  <text x="492" y="147" text-anchor="middle" font-size="9" fill="#64748b">여러 셀 동시 배치</text>
</svg>
